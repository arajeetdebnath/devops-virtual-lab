---
- name: Configure EC2 instance
  hosts: webservers
  become: yes
  tasks:
    - name: Update packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create sample index.html
      copy:
        dest: /var/www/html/index.html
        content: "<h1>Deployed via Ansible!</h1>"
